name: wevra-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-contract-tests:
    name: SDK contract tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Wevra (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Wevra SDK contract + provenance + extensions tests
        run: |
          python -m unittest \
            vision_mvp.tests.test_wevra_public_api \
            vision_mvp.tests.test_wevra_provenance \
            vision_mvp.tests.test_wevra_extensions \
            vision_mvp.tests.test_wevra_runtime \
            vision_mvp.tests.test_phase45_product \
            -v
      - name: Smoke-test console scripts
        run: |
          wevra --version
          wevra --profile local_smoke --out-dir /tmp/wevra-ci-smoke
          wevra-ci --report /tmp/wevra-ci-smoke/product_report.json \
                   --min-pass-at-1 1.0

  build-distributions:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: sdk-contract-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wevra-dist-${{ github.sha }}
          path: dist/*

  release:
    name: Release (on tag)
    runs-on: ubuntu-latest
    needs: build-distributions
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build
        run: python -m build
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body: |
            Wevra SDK release.
            See CHANGELOG.md for details.
            Contract-tested at `SDK_VERSION = wevra.sdk.v2`.
