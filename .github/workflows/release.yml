name: Publish to PyPI

# Triggered by pushing a ``v*`` tag (e.g. ``v0.5.17``) or by pushing
# to a ``release/*`` branch. Uses PyPI Trusted Publishers so no API
# token is stored in the repo.
#
# Pending publisher to register on PyPI before the first run:
#   Project name      : coordpy-ai
#   Owner             : adotdong29
#   Repository        : context-zero
#   Workflow filename : release.yml
#   Environment       : pypi
#
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine check-wheel-contents

      - name: Build sdist + wheel
        run: |
          python -m build

      - name: Run twine check
        run: python -m twine check dist/*

      - name: Run check-wheel-contents
        run: python -m check_wheel_contents dist/*.whl

      - name: Smoke-test the wheel against the public surface
        run: |
          python -m venv /tmp/cp
          /tmp/cp/bin/pip install --quiet --upgrade pip
          /tmp/cp/bin/pip install --quiet dist/*.whl
          /tmp/cp/bin/python tests/test_smoke_full.py
          /tmp/cp/bin/python examples/build_with_coordpy.py

      - name: Upload distribution as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/coordpy-ai/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
